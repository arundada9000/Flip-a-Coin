<body>
    <div class="premium-app" id="appFrame">
        <button class="drawer-toggle" id="drawerToggle" aria-label="Toggle Settings Menu" aria-expanded="false" aria-controls="sidebar">⚙️ Settings</button>

        <aside class="control-sidebar" id="sidebar" role="complementary" aria-label="Game Controls">
            <div class="brand">
                <img src="./images/coin.png" class="brand-logo" alt="Coin Toss Simulator Logo">
                <h1 style="font-size: 1.5rem; margin: 0; line-height: 1.2;">Coin Toss<br><span style="font-size: 1rem; font-weight: normal; color: #a0a0b0;">Simulator</span></h1>
            </div>

            <div class="control-group">
                <label id="materialLabel">Material</label>
                <div class="material-picker" role="group" aria-labelledby="materialLabel">
                    <button class="m-btn active" id="setGold" aria-pressed="true" aria-label="Set material to Gold">Gold</button>
                    <button class="m-btn" id="setSilver" aria-pressed="false" aria-label="Set material to Silver">Silver</button>
                </div>
            </div>

            <div class="control-group">
                <label id="actionsLabel">Actions</label>
                <button id="tossButton" class="p-btn p-btn-primary" aria-label="Flip the last added coin">Flip Last</button>
                <button id="tossAllButton" class="p-btn p-btn-outline" aria-label="Flip all active coins">Flip All</button>
            </div>

            <div class="control-group">
                <label for="coinCount">Add (Press Enter)</label>
                <div class="p-input-wrapper">
                    <input type="number" id="coinCount" value="1" min="1" class="p-input" aria-label="Number of coins to add">
                    <button id="addCoinsButton" class="p-btn-add" aria-label="Add coins">+</button>
                </div>
            </div>

            <div class="control-group">
                <div class="p-toggle-row">
                    <span id="tossStyleLabel">Vertical Toss</span>
                    <label class="p-switch" aria-labelledby="tossStyleLabel">
                        <input title="Toggle Style" type="checkbox" id="tossStyleToggle" checked aria-label="Toggle vertical toss style">
                        <span class="p-slider" aria-hidden="true"></span>
                    </label>
                </div>
            </div>

            <div class="control-group" id="installContainer" style="display: none; margin-top: 10px;">
                <label>App</label>
                <button id="installAppButton" class="p-btn p-btn-primary" aria-label="Install App for Offline Use" style="background: linear-gradient(135deg, #10b981 0%, #059669 100%); width: 100%;">Install App ⬇️</button>
            </div>
        </aside>

        <main class="arena" id="mainContent" role="main">
            <header class="arena-toolbar" aria-label="Arena Toolbar">
                <div class="status-indicator" role="status" aria-live="polite">● Luck Ready</div>
                <div class="arena-actions">
                    <button id="fullScreenIcon" class="icon-tool" aria-label="Enter Fullscreen">Fullscreen ⛶</button>
                    <button id="exitFullScreenIcon" class="icon-tool" style="display:none;" aria-label="Exit Fullscreen">Exit ✕</button>
                </div>
            </header>

            <div class="coin-surface" id="coinContainer" aria-label="Area showing all coins" aria-live="polite">
                <audio src="./Sounds/coin-flip-shimmer.mp3" id="flipSound" preload="auto"></audio>
                <audio src="./Sounds/coin-spinning.mp3" id="spinSound" preload="auto"></audio>
            </div>
        </main>

        <footer class="floating-stats" role="contentinfo" aria-label="Coin Toss Statistics" aria-live="polite">
            <div class="stat"><small>Tosses</small><strong id="totalTossCount" aria-label="Total Tosses">0</strong></div>
            <div class="stat"><small>Heads</small><strong id="headsCount" aria-label="Total Heads">0</strong></div>
            <div class="stat"><small>Tails</small><strong id="tailsCount" aria-label="Total Tails">0</strong></div>
            <div class="stat active"><small>Active</small><strong id="totalCoinsCount" aria-label="Total Active Coins">1</strong></div>
        </footer>
    </div>
    <script src="script.js"></script>
