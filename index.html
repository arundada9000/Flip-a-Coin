<body>
    <div class="premium-app" id="appFrame">
        <button class="drawer-toggle" id="drawerToggle">⚙️ Settings</button>

        <aside class="control-sidebar" id="sidebar">
            <div class="brand">
                <img src="./images/coin.png" class="brand-logo" alt="Logo">
                <div>
                    <h2>Coin Toss</h2>
                    <p>Simulator</p>
                </div>
            </div>

            <div class="control-group">
                <label>Material</label>
                <div class="material-picker">
                    <button class="m-btn active" id="setGold">Gold</button>
                    <button class="m-btn" id="setSilver">Silver</button>
                </div>
            </div>

            <div class="control-group">
                <label>Actions</label>
                <button id="tossButton" class="p-btn p-btn-primary">Flip Last</button>
                <button id="tossAllButton" class="p-btn p-btn-outline">Flip All</button>
            </div>

            <div class="control-group">
                <label>Add (Press Enter)</label>
                <div class="p-input-wrapper">
                    <input type="number" id="coinCount" value="1" min="1" class="p-input">
                    <button id="addCoinsButton" class="p-btn-add">+</button>
                </div>
            </div>

            <div class="control-group">
                <div class="p-toggle-row">
                    <span>Vertical Toss</span>
                    <label class="p-switch">
                        <input title="Toggle Style" type="checkbox" id="tossStyleToggle" checked>
                        <span class="p-slider"></span>
                    </label>
                </div>
            </div>
        </aside>

        <main class="arena">
            <header class="arena-toolbar">
                <div class="status-indicator">● Luck Ready</div>
                <div class="arena-actions">
                    <button id="fullScreenIcon" class="icon-tool">Fullscreen ⛶</button>
                    <button id="exitFullScreenIcon" class="icon-tool" style="display:none;">Exit ✕</button>
                </div>
            </header>

            <div class="coin-surface" id="coinContainer">
                <audio src="./Sounds/coin-flip-shimmer.mp3" id="flipSound"></audio>
                <audio src="./Sounds/coin-spinning.mp3" id="spinSound"></audio>
            </div>
        </main>

        <footer class="floating-stats">
            <div class="stat"><small>Tosses</small><strong id="totalTossCount">0</strong></div>
            <div class="stat"><small>Heads</small><strong id="headsCount">0</strong></div>
            <div class="stat"><small>Tails</small><strong id="tailsCount">0</strong></div>
            <div class="stat active"><small>Active</small><strong id="totalCoinsCount">1</strong></div>
        </footer>
    </div>
    <script src="script.js"></script>
</body>
